name: Release

on:
  pull_request:
    branches:
      - main
      - master
    types:
      - closed

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  version-bump:
    name: Bump Version
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get commits
        id: commits
        run: |
          COMMIT_MSGS=$(gh pr view ${{ github.event.pull_request.number }} --json commits -q '.commits[].commit.message')
          echo "commit_messages<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMIT_MSGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse commits and determine version level
        id: parse
        run: |
          LEVEL=$(node .github/scripts/parse-version.js)
          echo "level=$LEVEL" >> $GITHUB_OUTPUT
          echo "Version level determined: $LEVEL"
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          COMMIT_MESSAGES: ${{ steps.commits.outputs.commit_messages }}
      
      - name: Bump version
        id: bump
        run: |
          NEW_VERSION=$(node .github/scripts/bump-version.js ${{ steps.parse.outputs.level }})
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"
      
      - name: Commit and push version bump
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: release v${{ steps.bump.outputs.new_version }} [release]"
          git pull --rebase origin ${{ github.event.pull_request.base.ref }}
          git push origin ${{ github.event.pull_request.base.ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create and push tag
        run: |
          TAG="v${{ steps.bump.outputs.new_version }}"
          git tag $TAG
          git push origin $TAG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-release:
    name: Build and Release
    needs: version-bump
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: v${{ needs.version-bump.outputs.new_version }}
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      
      - name: Install dependencies
        run: bun install
      
      - name: Verify CLI
        run: |
          bun cli.mjs --version
          bun cli.mjs --help
      
      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git tag --sort=-creatordate | head -2 | tail -1)
          
          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" ${PREVIOUS_TAG}..HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)")
          fi
          
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate release date
        id: date
        run: |
          echo "date=$(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version-bump.outputs.new_version }}
          name: QK CLI v${{ needs.version-bump.outputs.new_version }}
          body: |
            ## QK CLI v${{ needs.version-bump.outputs.new_version }}
            
            ### 📦 Installation
            
            ```bash
            # Install via Homebrew
            brew tap choufeng/qk && brew install qk
            
            # Or clone and build
            git clone https://github.com/choufeng/qk.git
            cd qk
            bun install
            ```
            
            ### 📋 Changes
            
            ${{ steps.changelog.outputs.changelog }}
            
            ---
            
            *Released on ${{ steps.date.outputs.date }}*
          draft: false
          prerelease: ${{ contains(needs.version-bump.outputs.new_version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Notify completion
        run: |
          echo "✅ Release v${{ needs.version-bump.outputs.new_version }} created successfully!"
          echo "📦 Archives:"
          echo "  • https://github.com/${{ github.repository }}/archive/refs/tags/v${{ needs.version-bump.outputs.new_version }}.tar.gz"
          echo "  • https://github.com/${{ github.repository }}/archive/refs/tags/v${{ needs.version-bump.outputs.new_version }}.zip"
